# 每日AI日报配置
title: 每日AI日报
subtitle: 每天更新最新AI论文、开源项目和新闻
description: 每日AI日报 - 聚合每日AI领域最新进展，所有内容可追溯原始信源

# URL配置
baseurl: "/ai-daily-bot" # 如果部署在根域名下，改为 ""
url: "https://dengbiao.github.io"

# 作者信息
author:
  name: 每日AI日报
  email: 

# 主题配置
remote_theme: cotes2020/jekyll-theme-chirpy@master
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-archives
  - jekyll-include-cache

# 分页配置
paginate: 10
paginate_path: /page/:num/

# 永久链接格式
permalink: /:categories/:year/:month/:day/:title.html

# 搜索配置
search:
  provider: 

# 评论配置
comments:
  provider: false

# 分析配置
analytics:
  provider: false

# 社交链接
social:
  github: 
  twitter: 

# 时间设置
timezone: Asia/Shanghai
lang: zh-CN

# 分类顺序
category_order: date

# 日期格式
date_format: "%Y-%m-%d"

# 时区
timezone: Asia/Shanghai

# 排除文件
exclude:
  - utils
  - README.md
  - LICENSE
  - "*.gemspec"
