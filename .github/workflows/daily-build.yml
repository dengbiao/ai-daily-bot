name: Daily AI News Build and Deploy

# 每天定时运行（UTC时间0点，北京时间8点）
on:
  schedule:
    - cron: "0 0 * * *"
  # 支持手动触发
  workflow_dispatch:
  # 推送到main分支也触发
  push:
    branches: [ main ]

# Permissions required for deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
        cache: 'pip'
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Generate daily AI report
      run: |
        python -m scripts.generate_daily
        
    - name: Commit and push generated post
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add _posts/
        git diff --quiet && git diff --staged --quiet || git commit -m "chore: add daily AI report $(date +%Y-%m-%d)"
        git push
      continue-on-error: true
      
  deploy:
    needs: generate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
        
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          
      - name: Install dependencies
        run: |
          bundle install
          
      - name: Build with Jekyll
        run: |
          bundle exec jekyll build --destination ./_site
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
